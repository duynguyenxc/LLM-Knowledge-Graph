ining for medical professionals, particularly surgical residents. Its primary objective is to improve clinical decision-making skills related to biliary tract disease. This serious game combines elements of training and assessment in an engaging and challenging format, making the learning process both effective and enjoyable.\n\nThe game provides users with feedback on their decisions, allowing them to practice their skills repeatedly until they achieve mastery. By incorporating a quiz format that introduces time-pressure and competitive elements, the serious game aims to motivate players and simulate real-life scenarios they may encounter in clinical settings. This approach not only reinforces correct diagnosis and management strategies for biliary tract disease but also fosters a deeper understanding of the complexities involved in surgical decision-making.\n\nOverall, the serious game serves as a valuable resource for surgical professionals, offering a structured yet entertaining way to develop essential skills and knowledge in a critical area of healthcare.", "group": "INTERVENTION", "color": "#9b59b6", "value": 27, "degree": 17, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>MEDICAL STUDENTS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>STUDENTS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>PARTICIPANTS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DECISION-MAKING</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>TRAINING</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>SURGICAL RESIDENTS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>VALIDITY</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>SURGEONS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>RESIDENTS</b></li><li style='margin-bottom: 5px;'><i>is connec tic skills. The cases often include detailed patient histories, complaints, examination findings, and laboratory results, which are crucial for making informed clinical decisions.\n\nMoreover, clinical cases play a significant role in the assessment of medical students' diagnostic abilities. They are used to evaluate students' understanding and application of medical knowledge, particularly in specific areas such as jaundice. By engaging with these scenarios, students are encouraged to engage in self-explanation, which further enhances their clinical reasoning skills.\n\nOverall, clinical cases are a vital component of medical education, providing a structured framework for students to learn, practice, and assess their diagnostic skills in a realistic context. Through these scenarios, students gain valuable insights into patient care, preparing them for real-world medical practice.", "group": "MECHANISM_RESOURCE", "color": "#9b59b6", "value": 26, "degree": 16, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>MEDICAL STUDENTS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>SELF-EXPLANATION</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>TRAINING PHASE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CFS TRAINING</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>ASSESSMENT PHASE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>REFLECTION</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>STRUCTURED REFLECTION</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>LEARNING PHASE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>ACUTE VIRAL PERICARDITIS</b></li></ul>"}, {"id": "SPONTANEOUS REASONING CONDITION", "label": "SPONTANEOUS REASONING CONDITIO", "full_name": "SPONTANEOUS REASONING CONDITION", "desc": "The spontaneous reasoning con formatted in PNG and is organized within ZIP archives for storage. The requirement for specific formats and storage methods highlights the importance of maintaining the integrity and accessibility of patient information while adhering to privacy standards.\n\nOverall, patient records serve as a foundational element in both the Casebook application and Virtual Patient scenarios, emphasizing the need for careful handling and secure management of sensitive medical data.", "group": "MECHANISM_RESOURCE", "color": "#9b59b6", "value": 14, "degree": 4, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CASEBOOK</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>ANNOTATIONS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CASE FILE FORMAT</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>APPLICATION SECURITY</b></li></ul>"}, {"id": "LEARNING ENVIRONMENT", "label": "LEARNING ENVIRONMENT", "full_name": "LEARNING ENVIRONMENT", "desc": "The learning environment refers to the overall context in which learning occurs, influenced by instructional methods and resources.", "group": "OUTCOME", "color": "#9b59b6", "value": 16, "degree": 6, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>MEDICAL STUDENTS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>FEEDBACK</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC KNOWLEDGE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>TIME-ON-TASK</b></li></ul>"}, {"id": "MRI", "label": "MRI", "full_name": "MRI", "desc": "Magnetic Resonance Imaging (MRI) is a versatile diagnostic tool widely utilized in the medical field to visualize internal structures of the body. It is particularly effective in cases where there is a suspicion of disc prolapse, allowing healthcare professionals to assess spinal conditions with high precision. Additionally, MRI serves as a crucial imaging technique for examining various other internal systems, including the biliary system. This capability is essential for diagnosing conditions such as choledocholithiasis, which involves the presence of gallstones in the bile duct.\n\nThe strength of MRI lies in its ability to provide detailed images without the use of ionizing radiation, making it a safer alternative for patients. By employing strong magnetic fields and radio waves, MRI can produce high-resolution images that help in the accurate diagnosis and management of a wide range of medical conditions. Its applications extend beyond spinal issues and biliary disorders, encompassing various areas such as neurology, oncology, and musculoskeletal imaging.\n\nIn summary, MRI is a critical imaging modality that plays a significant role in diagnosing and evaluating a variety of health conditions, from spinal disc problems to biliary tract diseases, thereby enhancing patient care through improved diagnostic accuracy.", "group": "MECHANISM_RESOURCE", "color": "#9b59b6", "value": 13, "degree": 3, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC STRATEGIES</b></li></ul>"}, {"id": "DE-BIASING STRATEGIES", "label": "DE-BIASING STRATEGIES", "full_name": "DE-BIASING STRATEGIES", "desc": "", "group": "", "color": "#9b59b6", "value": 20, "degree": 10, "relations_html": "<p style='color: #888; font-style: italic;'>No core connections found.</p>"}, {"id": "FORMATIVE ASSESSMENTS", "label": "FORMATIVE ASSESSMENTS", "full_name": "FORMATIVE ASSESSMENTS", "desc": "Formative assessments are evaluations designed to monitor student learning and provide ongoing feedback, which plays a crucial role in enhancing learning outcomes. These assessments are particularly significant in educational contexts, as they drive student learning behavior and have been extensively studied for their impact on learning processes, especially in fields such as medicine. By offering continuous feedback, formative assessments help educators identify areas where students may struggle, allowing for timely interventions and adjustments to teaching strategies. This iterative process not only supports individual student growth but also fosters a deeper understanding of the material being taught. Overall, formative assessments are essential tools in the educational landscape, promoting effective learning and improving student performance.", "group": "MECHANISM_RESPONSE", "color": "#9b59b6", "value": 13, "degree": 3, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>UNDERGRADUATE MEDICAL STUDENTS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>MEDICAL EDUCATION</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>KEY FEATURE QUESTIONS</b></li></ul>"}, {"id": "CARDIAC PHYSICAL DIAGNOSIS", "label": "CARDIAC PHYSICAL DIAGNOSIS", "full_name": "CARDIAC PHYSICAL DIAGNOSIS", "desc": "Cardiac physical diagnosis is a clinical skill that involves diagnosing cardiac conditions through physical examination techniques.", "group": "OUTCOME", "color": "#9b59b6", "value": 15, "degree": 5, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>SCHEMAS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>SCHEMA-BASED REASONING</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>TRADITIONAL FRAMEWORK</b></li></ul>"}, {"id": "PILOT STUDY", "label": "PILOT STUDY", "full_name": "PILOT STUDY", "desc": "A pilot study conducted with Year 4 students to determine the sufficiency of 7 minutes for case analysis.", "group": "CONTEXT", "co ck is an instructional measure that plays a significant role in the educational development of students by providing them with the necessary insights to improve their skills and knowledge.", "group": "INTERVENTION", "color": "#9b59b6", "value": 13, "degree": 3, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC KNOWLEDGE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>TIME-ON-TASK</b></li></ul>"}, {"id": "PROCEDURAL KNOWLEDGE", "label": "PROCEDURAL KNOWLEDGE", "full_name": "PROCEDURAL KNOWLEDGE", "desc": "Procedural knowledge is defined as the understanding and ability to perform specific tasks or procedures. This type of knowledge is crucial in various fields, as it encompasses the skills and techniques necessary for executing particular actions effectively. It is developed and enhanced through repeated testing and case-based learning, which allows individuals to practice and refine their abilities in real-world scenarios. \n\nFurthermore, procedural knowledge is expected to be retained by students over time, indicating that with proper training and experience, individuals can maintain their proficiency in these tasks. This retention is essential for ensuring that the skills learned are not only acquired but also applied effectively in future situations. Overall, procedural knowledge plays a vital role in education and professional development, as it equips individuals with the necessary competencies to navigate complex tasks and challenges.", "group": "OUTCOME", "color": "#9b59b6", "value": 12, "degree": 2, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>UNDERGRADUATE MEDICAL STUDENTS</b></li></ul>"}, {"id": "PREMATURE CLOSURE", "label": "PREMATURE CLOSURE", "full_name": "PREMATURE CLOSURE", "desc": "Premature closure is a cognitive bias that affects diagnosticians and clinicians, characterized by the tendency to make a diagnosis too quickly without thoroughly evaluating all available evidence. This cognitive error occurs when healthcare professionals reach a conclusion before fully considering all relevant information, which can result in significant diagnostic errors. Specifically, premature closure involves a clinician ceasing to explore other potential diagnoses after arriving at an initial conclusion, thereby increasing the risk of overlooking critical data or alternative explanations. This bias highlights the importance of comprehensive assessment and critical thinking in the diagnostic process to ensure accurate and effective patient care.", "group": "MECHANISM_RESPONSE", "color": "#9b59b6", "value": 13, "degree": 3, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC ACCURACY</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC ERROR</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC PERFORMANCE</b></li></ul>"}, {"id": "KNOWLEDGE ELABORATION", "label": "KNOWLEDGE ELABORATION", "full_name": "KNOWLEDGE ELABORATION", "desc": "", "group": "", "color": "#9b59b6", "value": 13, "degree": 3, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CLINICAL REASONING</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>SELF-EXPLANATION</b></li></ul>"}, {"id": "RESULTS AND DISCUSSION", "label": "RESULTS AND DISCUSSION", "full_name": "RESULTS AND DISCUSSION", "desc": "The Results and Discussion sections are parts of a study where findings are presented and interpreted.", "group": "CONTEXT", "color": "#9b59b6", "value": 13, "degree": 3, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; eature list provides a structured set of characteristics that participants can use to identify and interpret the signals effectively during the study. This dual application underscores the versatility of the feature list as a diagnostic tool across different medical imaging modalities.\n\nOverall, the \"FEATURE LIST\" plays a significant role in facilitating the identification and diagnosis processes for both cell images and ECGs, thereby enhancing the accuracy and efficiency of medical evaluations conducted by participants.", "group": "MECHANISM_RESOURCE", "color": "#9b59b6", "value": 13, "degree": 3, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>PRACTICE PHASE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC DECISIONS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>ANALYTIC TRAINING GROUP</b></li></ul>"}, {"id": "EXPERTS", "label": "EXPERTS", "full_name": "EXPERTS", "desc": "Experts in clinical reasoning suggest educational interventions to address cognitive biases in diagnostic processes.", "group": "MECHANISM_RESPONSE", "color": "#9b59b6", "value": 15, "degree": 5, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CLINICAL REASONING</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>SELF-EXPLANATION</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC PERFORMANCE</b></li></ul>"}, {"id": "DIAGNOSTIC KNOWLEDGE", "label": "DIAGNOSTIC KNOWLEDGE", "full_name": "DIAGNOSTIC KNOWLEDGE", "desc": "Diagnostic knowledge encompasses the understanding and skills necessary for making accurate diagnoses, particularly within complex fields such as medicine. It involves the ability to interpret clinical information and apply reasoning effectively to arrive at sound conclusions regarding medical conditions. This knowledge is not only theoretical but also practical, integrating both declarative knowledge\u2014facts and concepts related to medical diagnoses\u2014and action-related components, which pertain to the application of this knowledge in real-world scenarios.\n\nIn the context of medical education, diagnostic knowledge is crucial for students as it equips them with the competencies needed to make informed decisions and accurate diagnoses. The development of this knowledge is often assessed through various tests and assessments, which measure the understanding and application of relevant information in domain-specific procedures. Enhanced educational methods are expected to improve students' diagnostic knowledge, thereby fostering their ability to navigate the complexities of medical diagnosis effectively.\n\nOverall, diagnostic knowledge is a vital component of medical training and practice, as it underpins the competency required for effective diagnostic reasoning and decision-making in healthcare settings.", "group": "OUTCOME", "color": "#9b59b6", "value": 38, "degree": 28, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>FEEDBACK</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CONTROL GROUP</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>ERRORS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>STATISTICAL SIGNIFICANCE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>ERRONEOUS EXAMPLES</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>ELABORATED FEEDBACK</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CASE-BASED WORKED EXAMPLE APPROACH</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>LEARNING ENVIRONMENT</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>WORKED EXAMPLES</b></li><li style='margin-bo in comprehension but also enhances the ability to apply learned concepts in practical scenarios, particularly in fields that require critical thinking and problem-solving skills, such as medicine.\n\nOverall, schema-based instruction serves as an effective pedagogical strategy that supports novice learners in developing their diagnostic reasoning abilities and achieving improved educational outcomes.", "group": "INTERVENTION", "color": "#9b59b6", "value": 23, "degree": 13, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>MEDICAL STUDENTS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC ACCURACY</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>STUDENTS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>LEARNING PHASE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>WRITTEN TEST</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>PRACTICAL TEST</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC SUCCESS</b></li></ul>"}, {"id": "WORKED EXAMPLES", "label": "WORKED EXAMPLES", "full_name": "WORKED EXAMPLES", "desc": "Worked examples are instructional materials that illustrate the steps of the diagnostic process, allowing students to engage with clinical scenarios.", "group": "MECHANISM_RESOURCE", "color": "#9b59b6", "value": 15, "degree": 5, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>FEEDBACK</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC KNOWLEDGE</b></li></ul>"}, {"id": "COMBINED INSTRUCTION GROUP", "label": "COMBINED INSTRUCTION GROUP", "full_name": "COMBINED INSTRUCTION GROUP", "desc": "Participants in this group were encouraged to use both analytic and non-analytic reasoning strategies when diagnosing ECGs cluding encounters with standardized patients and objective structured clinical examinations (OSCEs). These assessments measure the correctness of diagnoses made by students, often quantified through scores that reflect their understanding and application of clinical knowledge.\n\nIn specific fields such as cytopathology, diagnostic accuracy refers to the ability of cytologists to distinguish between normal and abnormal cells, a critical goal of their training. The accuracy of diagnoses in this context is vital for effective patient management and treatment decisions. Similarly, in cardiology, diagnostic accuracy is measured by how well students can identify cardiac conditions based on their training and knowledge.\n\nMoreover, diagnostic accuracy is not only about the correctness of individual diagnoses but also about the overall percentage of correct diagnoses made by participants during various assessments. This includes evaluations under different learning conditions and reasoning instructions, which can significantly affect outcomes. For example, the number of correct diagnoses made from presented ECGs is a specific measure of diagnostic accuracy in cardiology.\n\nOverall, diagnostic accuracy serves as a key indicator of a diagnostician's effectiveness, reflecting their ability to identify the presence or absence of medical conditions accurately. It is a critical component of medical education and practice, emphasizing the importance of effective teaching strategies and learning conditions in improving diagnostic skills. The ultimate goal is to enhance the ability of medical professionals to make accurate diagnoses, thereby improving patient outcomes and healthcare quality.", "group": "OUTCOME", "color": "#9b59b6", "value": 40, "degree": 87, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CLINICAL REASONING</b></li><li style='margin-bottom: 5px;'><i>is c e participants' conditions.\n\nIn summary, the limitations of the study highlight the need for caution in interpreting the results, as they stem from a narrow focus on ECG, a specific demographic of participants, and various methodological constraints.", "group": "CONTEXT", "color": "#9b59b6", "value": 16, "degree": 6, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>STUDENTS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>PARTICIPANTS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CFS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>RESEARCH</b></li></ul>"}, {"id": "AVAILABILITY BIAS", "label": "AVAILABILITY BIAS", "full_name": "AVAILABILITY BIAS", "desc": "Availability bias (AB) is a cognitive bias that significantly influences decision-making processes. It occurs when individuals depend on immediate examples that readily come to mind while evaluating a specific topic, concept, method, or decision. This reliance on easily recalled information can lead to potential misdiagnosis or flawed judgments, as it may not accurately represent the broader context or all relevant data.\n\nIn essence, availability bias skews perception and evaluation, causing individuals to overestimate the importance or frequency of events that are more memorable or recent in their experience. This cognitive shortcut can result in decisions that are not based on comprehensive analysis but rather on the most salient information available at the moment. Consequently, availability bias can impact various domains, including personal decision-making, professional judgments, and even public policy, as it shapes how individuals and groups assess risks and benefits based on their immediate recollections rather than objective data.", "group": "MECHANISM_RESOURCE", "color": "#9b59b6", "value": 13, "degree": 3, "relations_html": "<ul style='padd ul>"}, {"id": "COMBINED REASONING STRATEGIES", "label": "COMBINED REASONING STRATEGIES", "full_name": "COMBINED REASONING STRATEGIES", "desc": "Combined reasoning strategies are designed to assist novice diagnosticians in effectively interpreting electrocardiograms (ECGs) by overcoming the challenges posed by misleading information. These strategies involve the integration of various cognitive approaches, which collectively enhance diagnostic accuracy. By employing combined reasoning strategies, novice diagnosticians can improve their ability to analyze and interpret ECG data, leading to more reliable diagnoses. This multifaceted approach not only aids in mitigating the impact of potential errors but also fosters a deeper understanding of the complexities involved in ECG interpretation.", "group": "INTERVENTION", "color": "#9b59b6", "value": 15, "degree": 5, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>NOVICE DIAGNOSTICIANS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC ACCURACY</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC DECISION MAKING</b></li></ul>"}, {"id": "COMPETENCIES", "label": "COMPETENCIES", "full_name": "COMPETENCIES", "desc": "Competencies refer to the specific skills and abilities that surgical trainees must develop and demonstrate during their training.", "group": "OUTCOME", "color": "#9b59b6", "value": 14, "degree": 4, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>ENGAGEMENT</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>SURGICAL TRAINING</b></li></ul>"}, {"id": "COGNITIVE LOAD THEORY", "label": "COGNITIVE LOAD THEORY", "full_name": "COGNITIVE LOAD THEORY", "desc": "Cognitive Load Theory (CLT) is a framework that offers guidelines for the design of edu e": "PRACTICAL TEST", "desc": "The \"PRACTICAL TEST\" is an assessment designed to evaluate students' proficiency in applying their theoretical knowledge to real-world situations, specifically in the context of diagnosing lesions. This test emphasizes the practical application of skills, requiring participants to engage with a simulator that presents them with unrecognized lesions. During the assessment, students must accurately identify these lesions, documenting their diagnoses along with the key features that informed their evaluations. The practical test serves as a crucial component in ensuring that students are not only knowledgeable but also capable of effectively utilizing their skills in practical scenarios.", "group": "MECHANISM_RESOURCE", "color": "#9b59b6", "value": 13, "degree": 3, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DATA ANALYSIS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>SCHEMA-BASED INSTRUCTION</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>TESTING PHASE</b></li></ul>"}, {"id": "COGNITIVE BIAS", "label": "COGNITIVE BIAS", "full_name": "COGNITIVE BIAS", "desc": "Cognitive bias refers to systematic patterns of deviation from norm or rationality in judgment, which can significantly impact decision-making processes. These biases manifest as errors in reasoning that can lead to incorrect conclusions and judgments. In particular, cognitive biases can affect diagnostic accuracy among medical students, highlighting the importance of understanding these biases in the context of healthcare and medical education.\n\nCognitive biases often arise from rapid, nonanalytic thinking, which can result in hasty decisions without thorough analysis. This type of thinking can lead to diagnostic errors, as individuals may rely on heuristics or mental shortcuts that do not always align with objective reality. As a result, cognitive biases can compromise the quality of medical diagnoses and patient care.\n\nOverall, cognitive bias encompasses a range of systematic errors in judgment that can influence various fields, particularly in medical settings where accurate decision-making is crucial. Understanding and addressing these biases is essential for improving diagnostic accuracy and enhancing overall decision-making processes.", "group": "MECHANISM_RESPONSE", "color": "#9b59b6", "value": 15, "degree": 5, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC ACCURACY</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DECISION MAKING</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC ERROR</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>ANALYTIC REASONING GROUP</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CONTROL GROUP</b></li></ul>"}, {"id": "EXIT EXAMINATION", "label": "EXIT EXAMINATION", "full_name": "EXIT EXAMINATION", "desc": "The EXIT EXAMINATION is a comprehensive assessment administered at the conclusion of a course or study program. Its primary purpose is to evaluate the knowledge and skills that students have acquired throughout their educational experience. This examination serves as a critical measure of student performance, particularly focusing on their understanding and application of clinical reasoning, as well as their ability to engage with both intervention and control items relevant to their field of study. By assessing these competencies, the EXIT EXAMINATION ensures that students are adequately prepared for their professional responsibilities following graduation.", "group": "OUTCOME", "color": "#9b59b6", "value": 13, "degree": 3, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is n environment where innovative studies can take place to improve clinical practices and educational methodologies.", "group": "CONTEXT", "color": "#9b59b6", "value": 13, "degree": 3, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>MEDICAL STUDENTS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>RESIDENTS</b></li></ul>"}, {"id": "SELF-EXPLANATIONS", "label": "SELF-EXPLANATIONS", "full_name": "SELF-EXPLANATIONS", "desc": "Self-explanations are a cognitive strategy designed to improve understanding and learning by encouraging individuals to articulate concepts in their own words. This approach is particularly effective in educational settings, where students are prompted to explain their reasoning and understanding while engaging with new and unfamiliar material. By doing so, they not only clarify their own thoughts but also enhance their comprehension and diagnostic skills. This learning strategy fosters deeper cognitive processing, allowing learners to connect new information with existing knowledge, ultimately leading to improved retention and application of concepts.", "group": "INTERVENTION", "color": "#9b59b6", "value": 19, "degree": 9, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CLINICAL REASONING</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>SELF-EXPLANATION</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC PERFORMANCE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC COMPETENCE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>EXAMPLE-BASED LEARNING</b></li></ul>"}, {"id": "LESS FAMILIAR CASES", "label": "LESS FAMILIAR CASES", "full_name": "LESS FAMILIAR CASES", "desc": "\"Less familiar cases\" refer to clinical scenarios that students have limited or no prior exposure to, such as conditions like jaundice. These cases are designed to assess the effectiveness of self-explanation as a learning tool. When faced with less familiar cases, students are prompted to engage more deeply in the process of self-explanation, which encourages them to utilize their existing biomedical knowledge in new and challenging contexts. The unfamiliarity of these cases leads to varied inference outcomes, as students must draw upon their understanding and reasoning skills to navigate situations they have not previously encountered. Overall, less familiar cases serve as a valuable educational strategy to enhance critical thinking and problem-solving abilities in medical education.", "group": "CONTEXT", "color": "#9b59b6", "value": 17, "degree": 7, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>SELF-EXPLANATION</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>BIOMEDICAL KNOWLEDGE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>PARAPHRASES</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>ERRORS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>FAMILIAR CASES</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>SELF-EXPLANATION SEGMENTS</b></li></ul>"}, {"id": "COGNITIVE FORCING STRATEGIES", "label": "COGNITIVE FORCING STRATEGIES", "full_name": "COGNITIVE FORCING STRATEGIES", "desc": "Cognitive forcing strategies (CFS) are educational interventions designed to mitigate cognitive biases that can affect diagnostic reasoning, particularly among medical students and clinicians. These strategies serve as techniques that encourage individuals to critically reflect on their reasoning processes, thereby reducing the likelihood of diagnostic errors. By promoting a structured approach to thinking, CFS aims to enhance the accuracy of clinical decision-making and improve overall patient care. Through the implementation of these strategies, both medical students and practicing clinicians can develop a more analytical mindset, which is essential for effective diagnosis and treatment in the medical field.", "group": "INTERVENTION", "color": "#9b59b6", "value": 14, "degree": 4, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>STUDENTS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC ERROR</b></li></ul>"}, {"id": "DIAGNOSIS", "label": "DIAGNOSIS", "full_name": "DIAGNOSIS", "desc": "Diagnosis is a critical process in the medical field that involves the identification of a disease or condition affecting a patient. It is the conclusion reached by medical professionals, including students, after evaluating various factors such as symptoms, medical history, and other relevant information. The process of diagnosis is heavily influenced by the individual's self-explanation and reasoning skills, which play a significant role in interpreting the data collected during patient assessments.\n\nThe diagnosis process encompasses several key components. Initially, it involves gathering comprehensive information about the patient's symptoms and medical history. This information serves as the foundation for further evaluation. Medical students and professionals utilize clinical reasoning to analyze the data, leading to the identification of the patient's condition. This reasoning process is essential, as it synthesizes the gathered information and allows for a well-informed conclusion.\n\nIn simulated environments, the diagnosis process is further refined as students practice their skills in a controlled setting. Here, they engage in assessments that mimic real-life scenarios, allowing them to apply their knowledge and reasoning abilities to identify conditions accurately. This hands-on experience is crucial for developing the competencies required for effective diagnosis in actual clinical practice.\n\nOverall, diagnosis is a multifaceted process that integrates clinical reasoning, patient history, and symptom evaluation to arrive at a definitive conclusion regarding a patient's health status. It is a fundamental aspect of medical training and practice, ensuring that patients receive appropriate care based on accurate assessments of their conditions.", "group": "OUTCOME", "color": "#9b59b6", "value": 18, "degree": 8, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CLINICAL REASONING</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC PERFORMANCE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>PARTICIPANT</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>REPEATED-MEASURES ANOVA</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>SIMULATOR SESSION</b></li></ul>"}, {"id": "SURGICAL SKILLS TRAINING", "label": "SURGICAL SKILLS TRAINING", "full_name": "SURGICAL SKILLS TRAINING", "desc": "Surgical skills training involves the practice and development of skills necessary for performing surgical procedures effectively and safely.", "group": "INTERVENTION", "color": "#9b59b6", "value": 24, "degree": 14, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>MEDICAL EDUCATION</b></li></ul>"}, {"id": "ANNOTATIONS", "label": "ANNOTATIONS", "full_name": "ANNOTATIONS", "desc": "Annotations are additional insights provided by case designers within the electronic health records, offering context and rationale for the decisions made by physicians in the patient cases.", "group": "MECHANISM_RESOURCE", "color": "#9b59b6", "value": 13, "degree": 3, "relations_html": "<ul style='padding-left: 15px; font gin-bottom: 5px;'><i>is connected to</i> <b>PULMONARY FIBROSIS</b></li></ul>"}, {"id": "RETENTION TEST", "label": "RETENTION TEST", "full_name": "RETENTION TEST", "desc": "The \"RETENTION TEST\" is an evaluative measure designed to assess the long-term retention of clinical reasoning skills and knowledge among medical students. This test is conducted nine months after the initial training, allowing educators to gauge how effectively students have retained the information and skills acquired during their educational interventions, including e-seminars and exit exams. \n\nThe primary purpose of the retention test is to determine the extent of knowledge retention over time, specifically focusing on the clinical reasoning skills that are critical for medical practice. By evaluating students' performance after a significant period, the retention test provides insights into the effectiveness of the training programs and the durability of the knowledge imparted to the students. \n\nOverall, the retention test serves as a crucial tool for understanding the long-term impact of medical education on students' competencies, ensuring that they are well-prepared for their future roles in the healthcare field.", "group": "OUTCOME", "color": "#9b59b6", "value": 17, "degree": 7, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>STUDENT PERFORMANCE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>REPEATED TESTING</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>E-SEMINSAR</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>EXIT EXAM</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>E-SEMINARS</b></li></ul>"}, {"id": "NORMAN GR", "label": "NORMAN GR", "full_name": "NORMAN GR", "desc": "Norman GR is a prominent researcher in medical education, focusing on clinical reasoning and diagnostic knowledge.", "group": "CONTEX "Illness scripts are cognitive frameworks that assist individuals in understanding and categorizing clinical presentations, encompassing symptoms and underlying conditions. These scripts serve as cognitive structures that encapsulate limited knowledge about causal mechanisms while providing extensive clinically relevant information regarding the signs, symptoms, and enabling conditions associated with various diseases as they manifest in real patients.\n\nSpecifically, illness scripts consist of several key components: enabling conditions that facilitate the onset of a particular disease, the consequences that arise from that disease, and the biomedical faults that elucidate how these enabling conditions can lead to specific health outcomes. This structured knowledge allows healthcare professionals and students to efficiently process and interpret clinical information, ultimately aiding in diagnosis and treatment planning.\n\nBy integrating these elements, illness scripts provide a comprehensive understanding of diseases, enabling practitioners to recognize patterns in clinical presentations and make informed decisions based on the interplay of symptoms and underlying mechanisms. This cognitive approach is essential for effective clinical reasoning and enhances the ability to respond to patient needs in a timely and accurate manner.", "group": "CONTEXT", "color": "#9b59b6", "value": 25, "degree": 15, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>SELF-EXPLANATION</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIFFERENTIAL DIAGNOSIS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CLINICAL REASONING SKILLS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>BIOMEDICAL KNOWLEDGE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>STRUCTURED REFLECTION</b></li><li style='margin-bottom: 5px;'><i>is l context. This group comprises medical clerks, medical students, and residents who all engaged in self-explanation training without prompts during the training phase. The training involved listening to examples of self-explanations provided by residents, which aimed to enhance their diagnostic performance.\n\nDespite the lack of prompts, members of Group 2 demonstrated an improvement in their diagnostic performance; however, this improvement was noted to be less significant compared to that of Group 1, which likely received a different or more structured form of training. The absence of prompts during the self-explanation training indicates that Group 2's learning experience was more self-directed, relying on their ability to internalize and apply the examples they heard.\n\nOverall, Group 2 represents a diverse set of participants, including medical clerks, students, and residents, who were all subjected to a similar training condition that emphasized self-explanation without external prompts. This approach aimed to foster independent learning and critical thinking skills, although the outcomes suggest that the effectiveness of this method may vary when compared to more guided training interventions.", "group": "CONTEXT", "color": "#9b59b6", "value": 27, "degree": 17, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>SELF-EXPLANATION</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC PERFORMANCE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC ACCURACY SCORE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC PERFORMANCE SCORE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC PERFORMANCE SCORES</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>AGE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>GENDER</b></li><li style='m nected to</i> <b>CLINICAL KNOWLEDGE</b></li></ul>"}, {"id": "MEDICAL EDUCATION", "label": "MEDICAL EDUCATION", "full_name": "MEDICAL EDUCATION", "desc": "Medical Education is a comprehensive field dedicated to the training and education of healthcare professionals, including medical students, nurses, and specialists in various disciplines such as neurology and dentistry. This field emphasizes the development of essential knowledge and skills necessary for effective patient care, with a particular focus on clinical reasoning and diagnostic competence.\n\nThe training within Medical Education encompasses a variety of instructional methods and learning theories, which are designed to enhance the educational experience and outcomes for students. These methods include diverse teaching strategies aimed at fostering the critical thinking and problem-solving abilities required in medical practice. Structured reflection is also a key component, as it helps students improve their learning processes and diagnostic skills through self-assessment and feedback.\n\nIn addition to general medical training, Medical Education places significant importance on specific skills, such as surgical techniques and practices, ensuring that healthcare professionals are well-equipped to handle the complexities of patient care. The curriculum is designed to be comprehensive, addressing both theoretical knowledge and practical application, thereby preparing students for the multifaceted challenges they will face in their careers.\n\nOverall, Medical Education serves as a vital framework for cultivating the next generation of healthcare providers, ensuring they possess the necessary competencies to deliver high-quality care and adapt to the evolving landscape of medicine.", "group": "CONTEXT", "color": "#9b59b6", "value": 32, "degree": 22, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CLI  CASES", "desc": "FAR-TRANSFER CASES refer to clinical scenarios that significantly differ from the training cases used in educational settings. These cases are designed to evaluate the broader application of learned diagnostic skills, challenging individuals to apply their knowledge in new and varied contexts. In studies involving FAR-TRANSFER CASES, it has been observed that participants, particularly those in Group 1, demonstrated even stronger performance when faced with these far-transfer scenarios compared to a control group. This suggests that the ability to transfer skills to different situations is not only possible but can also lead to enhanced diagnostic capabilities. Overall, FAR-TRANSFER CASES serve as a critical tool in assessing the effectiveness of training programs and the adaptability of learned skills in real-world clinical environments.", "group": "OUTCOME", "color": "#9b59b6", "value": 15, "degree": 5, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>ASSESSMENT PHASE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>GROUP 1</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>GROUP 2</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>GROUP 1: RESIDENT SE WITH PROMPTS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>GROUP 2: RESIDENT SE WITHOUT PROMPTS</b></li></ul>"}, {"id": "PATIENT VIDEOS", "label": "PATIENT VIDEOS", "full_name": "PATIENT VIDEOS", "desc": "Patient videos are recordings of real patients that serve as valuable educational tools in the medical field. These videos provide context and narrative for virtual patient cases, significantly enhancing the learning experience for medical students and healthcare providers alike. By illustrating real-life experiences and symptoms, patient videos offer a unique perspective that enriches the understanding of various medical con i> <b>ASSESSMENT PHASE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>TRAINING CASES</b></li></ul>"}, {"id": "FAMILIAR CASES", "label": "FAMILIAR CASES", "full_name": "FAMILIAR CASES", "desc": "Familiar cases are defined as clinical scenarios that students have previously encountered, which significantly influences their learning and performance in medical education. These cases are characterized by the students' prior knowledge and exposure, allowing for a more streamlined cognitive process during inference tasks. For instance, familiar cases may include well-known conditions such as heart failure, which students have studied or experienced in clinical settings. \n\nThe familiarity with these cases leads to less extensive self-explanation when compared to less familiar cases, as students can draw upon their existing knowledge and experiences. This prior exposure not only aids in understanding but also enhances the ability to make inferences and apply learned concepts effectively. Consequently, familiar cases serve as a valuable educational tool, enabling students to build upon their existing knowledge base and improve their clinical reasoning skills. \n\nIn summary, familiar cases are integral to the learning process in medical education, as they leverage students' prior experiences to facilitate better understanding and performance in clinical tasks.", "group": "CONTEXT", "color": "#9b59b6", "value": 13, "degree": 3, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>SELF-EXPLANATION</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>LESS FAMILIAR CASES</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>SELF-EXPLANATION SEGMENTS</b></li></ul>"}, {"id": "DATA COLLECTION", "label": "DATA COLLECTION", "full_name": "DATA COLLECTION", "desc": "The entity \"DATA COLLECTION\" encompasses the systematic gathering of information for two distinct studies, each managed by different individuals to ensure thoroughness and accuracy in the data collected. For Study 1, the data collection process was overseen by LRB, while KWE took charge of the data collection for Study 2. This division of oversight allowed for a focused approach in each study, facilitating comprehensive data gathering necessary for subsequent analysis.\n\nThe data collection efforts were multifaceted, involving various methods to capture a wide range of information. One key aspect of the data collection involved gathering information from students regarding their performance in exams and their participation in e-seminars throughout the study period. This approach aimed to provide a holistic view of student engagement and academic performance.\n\nAdditionally, the data collection process included real-time observation and semi-structured interviews. These methods were employed to assess student performance during simulations, allowing researchers to gain deeper insights into the students' learning experiences and behaviors in a controlled environment. The combination of quantitative data from exams and qualitative insights from interviews and observations contributed to a robust dataset that could be analyzed for patterns and outcomes.\n\nOverall, the data collection for both studies was designed to be comprehensive and methodologically sound, ensuring that the information gathered would be valuable for understanding student performance and engagement in educational settings.", "group": "MECHANISM_RESOURCE", "color": "#9b59b6", "value": 18, "degree": 8, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>STUDENT PERFORMANCE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>STUDY 2</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>STUDY 1</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>TRIPARTITE TEACHING INTERVENTION</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>SIMULATION SESSION</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>INTERVIEW</b></li></ul>"}, {"id": "STUDENT PERFORMANCE", "label": "STUDENT PERFORMANCE", "full_name": "STUDENT PERFORMANCE", "desc": "Student performance encompasses a multifaceted evaluation of how well students understand and apply clinical knowledge in medical education. It is primarily measured through their results on tests, which reflect their comprehension and retention of essential concepts. Additionally, student performance is assessed based on their execution of clinical tasks and decision-making abilities during simulation sessions, which are critical components of practical medical training. \n\nFurthermore, student performance includes the assessment results of medical students in clinical reasoning tasks, which are evaluated through various testing methods. These assessments provide insights into students' capabilities to integrate theoretical knowledge with practical application in clinical scenarios. Overall, student performance serves as a comprehensive indicator of a medical student's readiness to engage in clinical practice, highlighting their proficiency in both knowledge retention and practical skills.", "group": "OUTCOME", "color": "#9b59b6", "value": 19, "degree": 9, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CLINICAL REASONING</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CASE-BASED LEARNING</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>EXIT EXAMINATION</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>RETENTION TEST</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DATA COLLECTION</b></li></ul>"}, {"id": "GAME", "label": "GAME", "full_name": "GAME", "desc": "The  educational material, particularly in the context of clinical cases. This method is designed to enhance comprehension, retention, and diagnostic performance, especially among medical students.\n\nAt its core, self-explanation involves students generating explanations for themselves as they work through problems or learning materials. This active learning strategy fosters cognitive engagement, prompting individuals to verbalize their thought processes, which can lead to a deeper understanding of the subject matter. By articulating their reasoning, students not only clarify their own thoughts but also reinforce their learning, making it a constructive approach to knowledge acquisition.\n\nIn the realm of medical education, self-explanation has been shown to significantly improve clinical reasoning skills. As students diagnose clinical cases, the practice of self-explanation helps them to reflect on their thought processes, thereby enhancing their diagnostic accuracy and performance. This technique is particularly beneficial when dealing with unfamiliar clinical scenarios, as it encourages learners to think critically and systematically about their reasoning.\n\nResearch indicates that self-explanation serves as an effective instructional procedure, impacting learning outcomes positively. It has been utilized as a method to evaluate its effects on diagnostic performance, demonstrating that students who engage in self-explanation tend to achieve better results in assessments of clinical cases. This strategy not only aids in the retention of medical knowledge but also promotes reflective approaches in clinical reasoning, which are essential for effective practice in healthcare settings.\n\nOverall, self-explanation is a valuable educational intervention that enhances learning by prompting students to articulate their understanding and reasoning. By integrating this technique into their study practices, learners can improve their cognitive engagement, diagnostic performa l": "JB", "full_name": "JB", "desc": "JB designed major aspects of the statistical analysis plan and contributed to the Introduction, Results, and Discussion sections.", "group": "INTERVENTION", "color": "#9b59b6", "value": 14, "degree": 4, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>RESULTS AND DISCUSSION</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>FINAL MANUSCRIPT</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CRITICAL REVISION</b></li></ul>"}, {"id": "RESEARCH", "label": "RESEARCH", "full_name": "RESEARCH", "desc": "Research encompasses systematic investigations aimed at understanding various educational phenomena and their impacts on learning outcomes. Specifically, it involves exploring the effects of structured reflection and self-explanation within the context of learning. \n\nOne aspect of research focuses on how structured reflection influences learning outcomes. This involves examining the processes through which learners engage in reflective practices, allowing them to analyze their experiences and integrate new knowledge effectively. The systematic investigation in this area seeks to identify the mechanisms by which structured reflection can enhance comprehension, retention, and application of information.\n\nAnother critical area of research investigates the role of self-explanation in medical education. This line of inquiry examines how learners articulate their understanding of concepts and processes, thereby facilitating deeper cognitive processing. The systematic investigation into self-explanation aims to determine its effectiveness in improving learning outcomes, particularly in complex fields such as medicine, where the ability to integrate and apply knowledge is essential.\n\nTogether, these research efforts contribute to a broader understanding of how different cognitive strategies can enhance s. These errors are particularly notable in the context of students, who tend to make more frequent mistakes when dealing with cases that are less familiar to them. In contrast, experts in the field exhibit a lower frequency of errors, suggesting that experience and familiarity with various cases contribute to more accurate diagnostic reasoning. The distinction highlights the challenges faced by less experienced individuals in accurately interpreting diagnostic information, especially in unfamiliar scenarios. Overall, the concept of errors encompasses both the general mistakes made during diagnosis and the specific challenges encountered by students, emphasizing the importance of experience in reducing the likelihood of such errors.", "group": "MECHANISM_RESPONSE", "color": "#9b59b6", "value": 16, "degree": 6, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>FEEDBACK</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>LESS FAMILIAR CASES</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>ERRONEOUS EXAMPLES</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC KNOWLEDGE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>PEERS</b></li></ul>"}, {"id": "DATA ANALYSIS", "label": "DATA ANALYSIS", "full_name": "DATA ANALYSIS", "desc": "Data analysis is a comprehensive process that encompasses various statistical methods and systematic examinations of data collected during studies, particularly in the context of medical education. It employs techniques such as ANOVA (Analysis of Variance) and unpaired t-tests to compare test scores among participants, facilitating the identification of key features that contribute to the understanding of educational outcomes.\n\nThe primary goal of data analysis is to derive meaningful insights and conclusions from the collected data. In the realm of medical education, this involves scrutinizing the effectiveness of different teaching methods, including self-explanation, to determine their impact on learning and retention. By systematically analyzing the data, researchers can assess how well these methods work and identify areas for improvement.\n\nOverall, data analysis serves as a critical tool in evaluating educational strategies, ensuring that findings are based on robust statistical evidence and providing a foundation for informed decision-making in the field of medical education.", "group": "MECHANISM_RESOURCE", "color": "#9b59b6", "value": 16, "degree": 6, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>MANUSCRIPT REVISION</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>WRITTEN TEST</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>PRACTICAL TEST</b></li></ul>"}, {"id": "JUNIOR DOCTORS", "label": "JUNIOR DOCTORS", "full_name": "JUNIOR DOCTORS", "desc": "", "group": "", "color": "#9b59b6", "value": 13, "degree": 3, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CLINICAL DECISION MAKING TEACHING INTERVENTION</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>SIMULATION SESSION</b></li></ul>"}, {"id": "CASEBOOK APPLICATION", "label": "CASEBOOK APPLICATION", "full_name": "CASEBOOK APPLICATION", "desc": "The Casebook application is a specialized software tool designed to enhance the educational experience for students in the medical field by facilitating the creation and management of Virtual Patient cases. This application serves multiple purposes, primarily aiding case creators in utilizing electronic health records (EHRs) as foundational elements for developing these cases. By encouraging the creation of a diverse pool of cases, the Casebook application supports es. Through this approach, students are guided to identify and rectify misconceptions, ultimately enhancing their overall comprehension and retention of the subject matter.\n\nIn summary, erroneous examples are a strategic educational practice that leverages incorrect information to foster deeper learning, critical analysis, and improved problem-solving skills among students.", "group": "INTERVENTION", "color": "#9b59b6", "value": 13, "degree": 3, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>FEEDBACK</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>ERRORS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC KNOWLEDGE</b></li></ul>"}, {"id": "TEST PHASE", "label": "TEST PHASE", "full_name": "TEST PHASE", "desc": "The final phase where participants are tested on their diagnostic skills using manipulated scenarios.", "group": "CONTEXT", "color": "#9b59b6", "value": 17, "degree": 7, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>PRACTICE PHASE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>COMBINED INSTRUCTION GROUP</b></li></ul>"}, {"id": "DIAGNOSTIC ERRORS", "label": "DIAGNOSTIC ERRORS", "full_name": "DIAGNOSTIC ERRORS", "desc": "Diagnostic errors in medicine encompass failures in the process of accurately diagnosing a patient's condition. These errors can result in incorrect treatment decisions and adverse health outcomes, making them a significant concern in clinical practice and medical education. Such mistakes may occur during the identification of a patient's condition and can sometimes only be revealed posthumously, such as through autopsy findings or systematic reviews of cases.\n\nThe implications of diagnostic errors are profound, as they can lead to mismanagement of a patient's health, potentially exacerbating their condition or leading to unnecessary interventions. The recognition of these errors highlights the need for improved medical education and training, which can help healthcare professionals enhance their diagnostic skills and reduce the likelihood of such mistakes occurring in clinical settings.\n\nOverall, diagnostic errors represent a critical area of focus within the medical field, emphasizing the importance of accurate diagnosis as a cornerstone of effective patient care. Addressing these errors through better training and systematic approaches is essential for improving patient outcomes and ensuring the safety and efficacy of medical practice.", "group": "OUTCOME", "color": "#9b59b6", "value": 16, "degree": 6, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CLINICAL REASONING</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>EDUCATIONAL STRATEGIES</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CLINICAL DECISION MAKING TEACHING INTERVENTION</b></li></ul>"}, {"id": "COMBINED REASONING INSTRUCTION", "label": "COMBINED REASONING INSTRUCTION", "full_name": "COMBINED REASONING INSTRUCTION", "desc": "Combined reasoning instruction is a teaching method that encourages participants to use both analytic and non-analytic reasoning strategies.", "group": "INTERVENTION", "color": "#9b59b6", "value": 13, "degree": 3, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC ACCURACY</b></li></ul>"}, {"id": "GENDER", "label": "GENDER", "full_name": "GENDER", "desc": "Gender distribution among participants, indicating the percentage of male and female individuals in each group.", "group": "MECHANISM_RESOURCE", "color": "#9b59b6", "value": 16, "degree": 6, "relations_html": "<ul style='padding-l an accurate or timely diagnosis, which can arise from various cognitive biases and lead to significant consequences for patient care. This type of error can result in inappropriate treatment, which may adversely affect patient outcomes, including potential harm. The implications of diagnostic error are serious, as it can lead to incorrect identification of a medical condition, ultimately resulting in negative patient outcomes.\n\nThe phenomenon of diagnostic error encompasses a range of issues, including the misidentification of a patient's condition. Such errors can stem from cognitive biases that affect healthcare professionals' decision-making processes. The consequences of these errors are profound, as they can lead to not only inappropriate treatment but also a deterioration in the patient's health status.\n\nEfforts to mitigate diagnostic errors, such as training programs like CFS (Cognitive Forcing Strategies), aim to enhance the accuracy and timeliness of diagnoses. By addressing the cognitive biases that contribute to these errors, healthcare providers can improve their diagnostic capabilities, thereby reducing the likelihood of misdiagnosis and its associated risks.\n\nIn summary, diagnostic error represents a critical challenge in the healthcare field, characterized by the failure to accurately and promptly diagnose medical conditions. This failure can lead to inappropriate treatments and significant harm to patients, underscoring the importance of ongoing education and training to minimize such errors and improve patient safety.", "group": "OUTCOME", "color": "#9b59b6", "value": 40, "degree": 37, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CLINICAL REASONING</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>PNEUMONIA</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>MEDICAL EDUCATION</b></li><li style='margin-bo mposition facilitates a better understanding of the information at hand, enabling individuals to make informed decisions based on a thorough analysis. Participants in educational settings, particularly in combined instruction groups, are encouraged to adopt this systematic approach to enhance their problem-solving capabilities.\n\nOverall, analytic reasoning is a vital cognitive skill that supports effective decision-making and problem-solving by promoting a logical and methodical examination of information.", "group": "MECHANISM_RESPONSE", "color": "#9b59b6", "value": 22, "degree": 12, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC ACCURACY</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DECISION MAKING</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>COMBINED INSTRUCTION GROUP</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC DECISIONS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC ERROR</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>COMBINED REASONING STRATEGY</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>SEOUL NATIONAL UNIVERSITY COLLEGE OF MEDICINE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CLINICAL JUDGMENT</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CYTOPATHOLOGY TRAINING</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>TRAINING PROTOCOLS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>MISS ERROR RATE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>FALSE ALARM RATE</b></li></ul>"}, {"id": "DIAGNOSTIC REASONING", "label": "DIAGNOSTIC REASONING", "full_name": "DIAGNOSTIC REASONING", "desc": "Diagnostic reasoning is a critical cognitive process employed by clinicians in both veterinary and medical fields to develop hypotheses and make informed decisions based on patient information gathered during consultations. This process involves the application of logic to connect observed data abnormalities to the underlying mechanisms of disease. By synthesizing clinical findings, patient history, and diagnostic tests, clinicians utilize diagnostic reasoning to identify potential health issues and formulate appropriate treatment plans. This systematic approach not only aids in accurate diagnosis but also enhances the overall quality of patient care by ensuring that decisions are grounded in a thorough understanding of the patient's condition.", "group": "MECHANISM_RESPONSE", "color": "#9b59b6", "value": 15, "degree": 5, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CLINICAL REASONING</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC ERROR</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>MULTIPLE-CHOICE QUESTIONS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>NOVEL EDUCATIONAL TOOL</b></li></ul>"}, {"id": "GERIATRIC EDUCATION", "label": "GERIATRIC EDUCATION", "full_name": "GERIATRIC EDUCATION", "desc": "Geriatric education focuses on the healthcare needs of older adults, aiming to improve the quality of care provided to this population.", "group": "INTERVENTION", "color": "#9b59b6", "value": 13, "degree": 3, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>E-LEARNING</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>VIRTUAL PATIENTS</b></li></ul>"}, {"id": "VALIDITY", "label": "VALIDITY", "full_name": "VALIDITY", "desc": "Validity is a critical measure in assessing the effectiveness of serious games designed for training surgical residents. It encompasses several dimensions, including face validity, content validity, and construct validity. Face validity pertains to the extent to which the game appears to be effective and relevant to the training objectives from the perspective of the users, such as the residents and instructors. Content validity evaluates whether the game covers all necessary aspects of surgical training and accurately reflects the skills and knowledge required in real-world scenarios. Construct validity focuses on the game's ability to measure differences in performance among players with varying levels of expertise, ensuring that it can effectively differentiate between novice and experienced surgical residents.\n\nOverall, validity is essential in determining how well the serious game represents medical constructs and its capability to accurately assess and enhance the skills of surgical trainees. By ensuring high validity, the game can serve as a reliable tool in the education and training of future surgeons, ultimately contributing to improved patient outcomes in clinical settings.", "group": "OUTCOME", "color": "#9b59b6", "value": 14, "degree": 4, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>MEDICAL STUDENTS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>SERIOUS GAME</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>SURGICAL RESIDENTS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>SURGEONS</b></li></ul>"}, {"id": "POST HOC ANALYSES", "label": "POST HOC ANALYSES", "full_name": "POST HOC ANALYSES", "desc": "Post hoc analyses refer to statistical tests that are performed after the completion of an experiment. Their primary purpose is to investigate and clarify the differences between groups, particularly in relation to statistical significance. These analyses are essential for gaining deeper insights into the data collected during the initial study, allowing researchers to explore the effects of interventions on various groups more thoroughly. By conducting post hoc analyses, researchers can identify specific patterns and relationships that may not have been evident in the initial analysis, thereby enhancing the overall understanding of the experimental outcomes.", "group": "MECHANISM_RESPONSE", "color": "#9b59b6", "value": 14, "degree": 4, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC ACCURACY</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC PERFORMANCE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>INTERVENTION IN THE TRAINING PHASE</b></li></ul>"}, {"id": "CLINICAL REASONING", "label": "CLINICAL REASONING", "full_name": "CLINICAL REASONING", "desc": "Clinical reasoning is a fundamental cognitive process utilized by healthcare providers to evaluate patient information, make diagnoses, and formulate treatment plans. This skill is particularly critical for doctors, as it involves the ability to make sound judgments based on clinical information and patient data. In the context of medical education, clinical reasoning is essential, as it requires the application of knowledge to new clinical situations, enabling informed decision-making regarding diagnostics and therapeutics.\n\nThe process of clinical reasoning encompasses both analytical and intuitive thinking, allowing healthcare professionals to effectively evaluate and manage patient care. It involves the integration and application of various types of knowledge, weighing evidence, and employing critical thinking skills. A solid knowledge base is crucial for effective clinical reasoning, as is deliberate practice and metacognitive processes, such as reflective coping, which help practitioners assess their own thought processes and improve their decision-making abilities.\n\nMoreover, clinical reasoning is not only relevant for experienced healthcare providers but also for students in clinical settings. It refers to the thought processes that students engage in to make decisions and solve problems, highlighting its importance in the training and development of future healthcare professionals. Overall, clinical reasoning is a multifaceted skill that is vital for ensuring high-quality patient care and effective healthcare delivery.", "group": "CONTEXT", "color": "#9b59b6", "value": 40, "degree": 81, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>STUDENT PERFORMANCE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>REPEATED TESTING</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>KEY FEATURE EXAMINATIONS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>KEY FEATURE QUESTIONS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>TEST-ENHANCED LEARNING</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>TEACHING CLINICAL REASONING</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSIS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIFFERENTIAL DIAGNOSIS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>PROBLEM-BASED LEARNING</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC REASONING</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>UNDERGRADUATE MEDICAL STUDENTS</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>PHYSICAL EXAMINATION</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC ERROR</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>SELF-EXPLANATION</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>BIOMEDICAL KNOWLEDGE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CLERKSHIP</b></li><li style='margin-bottom: 5 555; margin-top: 10px;'><li style='margin-bottom: 5px;'><i>is connected to</i> <b>CONTROL GROUP</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>DIAGNOSTIC COMPETENCE</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>GROUP 1</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>GROUP 2</b></li><li style='margin-bottom: 5px;'><i>is connected to</i> <b>REPEATED-MEASURES ANOVA</b></li></ul>"}, {"id": "MISCONCEPTIONS", "label": "MISCONCEPTIONS", "full_name": "MISCONCEPTIONS", "desc": "Misconceptions refer to incorrect beliefs or understandings that can significantly impede the learning process, particularly in the context of medical education. These misconceptions manifest as erroneous views that students hold about medical conditions, which are often documented in their learner reports but frequently go unaddressed. Such misunderstandings can obstruct the effective integration of biomedical knowledge into the conceptual framework known as illness scripts, which are essential for diagnosing and treating patients.\n\nIn the realm of medical education, misconceptions are particularly concerning because they not only affect students' grasp of medical concepts but also their ability to apply this knowledge in practical scenarios. The persistence of these incorrect beliefs can lead to a lack of confidence in clinical decision-making and ultimately impact patient care. Therefore, addressing and rectifying these misconceptions is crucial for fostering a deeper understanding of medical subjects and enhancing the overall educational experience for students.\n\nOverall, misconceptions represent a significant barrier to learning in medical education, necessitating targeted interventions to ensure that students develop accurate and comprehensive understandings of medical conditions and practices.", "group": "OUTCOME", "color": "#9b59b6", "value": 16, "degree": 6, "relations_html": "<ul style='padding-left: 15px; font-size: 14px; color: #         var container = document.getElementById('network_pane');
        var data = {
            nodes: new vis.DataSet(raw_data.nodes),
            edges: new vis.DataSet(raw_data.edges)
        };
        var options = {
            nodes: {
                shape: 'dot',
                font: { size: 14, face: 'Tahoma', color: '#333' },
                borderWidth: 2,
                shadow: true
            },
            edges: {
                width: 1,
                color: { inherit: 'both', opacity: 0.5 },
                smooth: { type: 'continuous' }
            },
            physics: {
                forceAtlas2Based: {
                    gravitationalConstant: -100,
                    centralGravity: 0.01,
                    springLength: 200,
                    springConstant: 0.08
                },
                maxVelocity: 50,
                solver: 'forceAtlas2Based',
                timestep: 0.35,
                stabilization: { iterations: 150 }
            },
            interaction: {
                hover: true,
                navigationButtons: true,
                keyboard: true
            }
        };

        var network = new vis.Network(container, data, options);

        // Click Event - Populate Side Panel
        network.on("click", function (params) {
            if (params.nodes.length > 0) {
                var nodeId = params.nodes[0];
                var clickedNode = data.nodes.get(nodeId);
                
                document.getElementById('placeholder_text').style.display = 'none';
                document.getElementById('details_box').style.display = 'block';
                
                // Color formatting
                document.getElementById('node-type').innerText = clickedNode.group;
                document.getElementById('node-type').style.backgroundColor = clickedNode.color;
                
                document.getElementById('node-title').innerText = clickedNode.full_name;
                document.getElementById('node-desc').innerText = clickedNode.desc;
                document.getElementById('node-degree').innerText = clickedNode.degree;
                document.getElementById('node-relationships').innerHTML = clickedNode.relations_html;
            } else {
                // Clicking empty space closes the panel
                document.getElementById('placeholder_text').style.display = 'block';
                document.getElementById('details_box').style.display = 'none';
            }
        });

        // Search Engine Feature
        document.getElementById('search-btn').addEventListener('click', function() {
            var searchTerm = document.getElementById('search-box').value.toLowerCase();
            if (!searchTerm) return;
            
            var allNodes = data.nodes.get();
            var matchedNode = allNodes.find(n => n.full_name.toLowerCase().includes(searchTerm) || n.label.toLowerCase().includes(searchTerm));
            
            if (matchedNode) {
                // Focus graph camera on the matched node
                network.selectNodes([matchedNode.id]);
                network.focus(matchedNode.id, {
                    scale: 1.5,
                    animation: { duration: 1000, easingFunction: 'easeInOutQuad' }
                });
                
                // Emulate click to populate side panel
                network.emit('click', { nodes: [matchedNode.id] });
            } else {
                alert("Concept '" + searchTerm + "' was not found in this core graph.");
            }
        });
        
        // Enter key support for search
        document.getElementById('search-box').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('search-btn').click();
            }
        });
